# Match Adwaita dark's terminal-like background instead of Kitty's default pure black.
enabled_layouts tall,grid

font_family SauceCodePro Nerd Font
background #1e1e1e
background_opacity 0.75
scrollbar always
scrollbar_interactive yes

# Shared defaults live here; per-OS overrides keep Linux and macOS usable.
include ${KITTY_OS}.conf
